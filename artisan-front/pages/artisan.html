<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fiche artisan</title>

        <link href="/artisan-front/asset/img/favicon.png" rel="icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body>
        <div id="header"></div>

        <main class="container mt-5">

            <!--Fiche contacte-->
            <div class="card shadow p-4">

                <div class="row">

                    <div class="col-md-4 text-center">

                        <img id="artisan-photo"
                            src="/artisan-front/asset/img/favicon.png"
                            class="img-fluid rounded mb-3"
                        >

                    </div>

                    <div class="col-md-8">
                        <i class="bi bi-star-fill"><p id="artisan-note"></p></i>

                        <h2 id="artisan-nom"></h2>

                        <span id="artisan-specialite"
                        class="badge bg-primary mb-2"></span>

                        <p class="text-muted">
                        Ville : <span id="artisan-ville"></span>
                        </p>

                        <p id="artisan-description"></p>

                        <a id="artisan-site"
                        class="btn btn-outline-primary d-none"
                        target="_blank"></a>

                    </div>

                </div>

            </div>


            <!--Formulaire-->

            <form form id="contactForm">
               
                <label for="nom" class="form-label">Nom</label>
                <input id="nom" type="text" class="form-control" required>

                <label for="objet" class="form-label">Objet</label>
                <input id="objet" type="text" class="form-control" required>

                <div class="mb-3">
                <label for="mail" class="form-label">Email</label>
                <input id="mail" type="email" class="form-control" required>
            
                <label for="message" class="form-label">Message</label>
                <textarea id="message" class="form-control" rows="5" required></textarea>              
                
                <button>Envoyer</button>
            </form>

        </main>

        <div id="footer"></div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/artisan-front/asset/js/components.js"></script>
        <script src="/artisan-front/asset/js/artisan.js"></script>
    </body>
</html>
